<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Aaru.in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #232f3e; color: white; padding: 20px; flex-shrink: 0; }
        .main-content { flex-grow: 1; padding: 30px; background: #f3f3f3; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .product-table th, .product-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        .product-table th { background: #fafafa; font-weight: bold; }
        .status-pill { padding: 4px 8px; border-radius: 12px; font-size: 12px; background: #e7f4e4; color: #2e7d32; }
        .edit-btn { cursor: pointer; background: none; border: none; color: #0066c0; margin-right: 10px; font-weight: bold; }
        .delete-btn { cursor: pointer; background: none; border: none; color: #B12704; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="logo" style="margin-bottom: 40px; font-size: 24px; font-weight: bold;">Aaru<span style="color: #f08804;">.in</span> Admin</div>
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 20px; cursor: pointer; color: #f08804;">📊 Overview</li>
                <li style="margin-bottom: 20px; cursor: pointer;">📦 Inventory</li>
                <li style="margin-bottom: 20px; cursor: pointer;">🚚 Orders</li>
                <li style="margin-bottom: 20px; cursor: pointer;">👥 Customers</li>
                <hr style="opacity: 0.2; margin-bottom: 20px;">
                <li style="cursor: pointer;" onclick="logoutAdmin()">🚪 Logout</li>
            </ul>
        </nav>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Inventory Overview</h1>
                <button class="auth-btn" style="width: auto; padding: 10px 20px; background: #f08804; border: none; border-radius: 5px; cursor: pointer;">+ Add New Product</button>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <p>Total Products</p>
                    <h2 id="total-count">0</h2>
                </div>
                <div class="stat-card">
                    <p>Low Stock Items</p>
                    <h2 style="color: #B12704;">12</h2>
                </div>
                <div class="stat-card">
                    <p>Categories</p>
                    <h2>3</h2>
                </div>
                <div class="stat-card">
                    <p>Active Sellers</p>
                    <h2>1</h2>
                </div>
            </div>

            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: 20px;">Recent Items</h3>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api/admin/products';
        const ADMIN_SECRET = 'aaru-admin-access-key';

        function logoutAdmin() {
            localStorage.removeItem('adminKey');
            window.location.href = 'admin-login.html';
        }

        // --- FETCH AND RENDER PRODUCTS ---
        async function fetchAdminProducts() {
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'GET',
                    headers: { 'admin-secret': ADMIN_SECRET }
                });

                if (!response.ok) throw new Error("Unauthorized");

                const products = await response.json();
                const tbody = document.getElementById('admin-product-list');
                
                tbody.innerHTML = products.slice(0, 50).map(p => `
                    <tr id="row-${p._id}">
                        <td><img src="${p.imageUrl}" width="40" style="border-radius:4px"></td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>₹${p.price.toLocaleString('en-IN')}</td>
                        <td><span class="status-pill">${p.stock} units</span></td>
                        <td>
                            <button class="edit-btn" onclick="editProduct('${p._id}')">Edit</button>
                            <button class="delete-btn" onclick="deleteProduct('${p._id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
                
                document.getElementById('total-count').innerText = products.length.toLocaleString();
            } catch (err) {
                console.error("Failed to load products:", err);
            }
        }

        // --- DELETE FUNCTION ---
        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/${id}`, {
                        method: 'DELETE',
                        headers: { 'admin-secret': ADMIN_SECRET }
                    });

                    const result = await response.json();

                    if (result.success) {
                        const row = document.getElementById(`row-${id}`);
                        row.style.opacity = '0';
                        setTimeout(() => {
                            row.remove();
                            const countElem = document.getElementById('total-count');
                            let count = parseInt(countElem.innerText.replace(/,/g, ''));
                            countElem.innerText = (count - 1).toLocaleString();
                        }, 300);
                    } else {
                        alert("Delete failed: " + result.message);
                    }
                } catch (err) {
                    alert("Error connecting to server.");
                }
            }
        }

        // --- FULLY EDITABLE FUNCTION ---
        async function editProduct(id) {
            const newName = prompt("Edit Product Name (Leave blank to keep current):");
            const newCategory = prompt("Edit Category (Electronics, Books, Home & Kitchen):");
            const newPrice = prompt("Edit Price (₹):");
            const newStock = prompt("Edit Stock units:");
            const newImageUrl = prompt("Edit Image URL:");

            const updateData = {};
            if (newName) updateData.name = newName;
            if (newCategory) updateData.category = newCategory;
            if (newPrice) updateData.price = parseFloat(newPrice);
            if (newStock) updateData.stock = parseInt(newStock);
            if (newImageUrl) updateData.imageUrl = newImageUrl;

            if (Object.keys(updateData).length === 0) {
                alert("No changes entered.");
                return;
            }

            await updateProduct(id, updateData);
        }

        // --- FIXED UPDATE API CALL ---
        async function updateProduct(id, data) {
            try {
                // FIXED: Explicitly added the "/" before the ID to ensure valid path
                const response = await fetch(`${API_BASE_URL}/${id}`, { 
                    method: 'PUT',
                    headers: { 
                        'admin-secret': 'aaru-admin-access-key',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    alert("✅ Product Updated Successfully!");
                    fetchAdminProducts(); // Refresh table to show all changes
                } else {
                    alert("❌ Update failed: " + result.message);
                }
            } catch (err) {
                alert("Connection error while updating. Make sure your backend is running.");
            }
        }

        // --- INITIAL LOAD ---
        fetchAdminProducts();
    </script>
</body>
</html>
