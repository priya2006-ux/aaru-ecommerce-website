<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aaru.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; color: black; margin-bottom: 20px;">Aaru<span style="color: #f08804;">.in</span></div>
        
        <div class="login-box">
            <h1>Sign-In</h1>

            <form id="login-form">
                <label for="email">Email or mobile phone number</label>
                <input type="email" id="login-email" required>

                <div style="display: flex; justify-content: space-between;">
                    <label for="password">Password</label>
                    <a href="#" style="font-size: 12px; color: #0066c0; text-decoration: none;" onclick="alert('Password reset link sent to your email!')">Forgot Password?</a>
                </div>
                <input type="password" id="login-password" required>

                <button type="submit" class="auth-btn">Continue</button>
            </form>

            <p class="disclaimer">By continuing, you agree to Aaru's Conditions of Use and Privacy Notice.</p>
        </div>

        <div class="new-to-aaru">
            <p>New to Aaru?</p>
            <button class="create-account-btn">Create your Aaru account</button>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role: 'user' })
            });
            
            const data = await response.json();
            if (data.success) {
                window.location.href = "index.html"; 
            } else {
                alert("Invalid Credentials.");
            }
        });
    </script>
</body>
</html>
